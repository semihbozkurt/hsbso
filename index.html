<!DOCTYPE html>
<html>
    <head>
        <link rel="icon" type="image/png" href="favicon-removebg-preview.png">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
        <title>HSBso</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            html, body{
                overflow-x: hidden;
            }
            body { margin: 0; font-family: sans-serif; background: #121212; color: white;
                overflow-x: hidden; /* Sağa doğru kaymayı (scroll) tamamen kapatır */
             }

            .section {
            width: 100%;
            min-height: 100vh; /* Her bölüm ekranın tamamını kaplar */
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 2px solid rgba(24, 131, 40, 0.1);
}
            .section:first-of-type {
                margin-top: 60px; /* Header kadar boşluk bırakır */
            }

            .header-footer {
                align-items: center;
                min-height: 60px;
                height: 60px;
                display: flex;
                width: 100%;
                box-sizing: border-box;
                justify-content: space-between;
                padding: 5px 50px;
                z-index: 1000;
            }

            /* Hamburger Çizgileri */
            .hamburger {
                display: flex;
                flex-direction: column;
                gap: 5px;
                cursor: pointer;
                z-index: 101;
            }

            .hamburger span {
                width: 30px;
                height: 3px;
                background-color: white;
                transition: 0.3s;
            }

            /* Menü Tasarımı (Kapalıyken) */
            .nav-menu {
                position: absolute;
                top: 60px;
                right: -100%; /* Ekranın sağında gizli */
                background: rgba(26, 26, 26, 0.95);
                width: 200px;
                height: auto;
                display: flex;
                flex-direction: column;
                padding: 20px;
                transition: 0.5s;
                border-radius: 0 0 0 20px;
                box-shadow: -5px 5px 15px rgba(0,0,0,0.5);
            }

            /* Menü Açıldığında (JS ile bu sınıfı ekleyeceğiz) */
            .nav-menu.active {
                right: 0;
            }

            .nav-menu a {
                color: white;
                text-decoration: none;
                padding: 15px;
                border-bottom: 1px solid #333;
                transition: 0.3s;
            }

            .nav-menu a:hover {
                color: #3498db;
                padding-left: 25px;
            }

            /* Hamburger X Şekline Dönüşsün */
            .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 6px); }
            .hamburger.active span:nth-child(2) { opacity: 0; }
            .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -6px); }


                /* Buton Konteynırı */
            .button-container {
                gap: 150px; /* Butonlar arası boşluk */
                height: 100vh; /* Bu bölüm ekranın tamamı */
            }

    /* Özel Buton Tasarımı */
            .custom-button {
                width: 300px; /* Yatay genişlik */
                height: 400px; /* Dikey uzunluk (yatayın 2 katı) */
                border-radius: 30px; /* Yuvarlak köşeler */
                cursor: pointer;
                background-size: cover;
                background-position: center;
                transition: all 0.4s ease; /* Hover geçişi yumuşaklığı */
                display: flex;
                align-items: flex-end;
                justify-content: center;
                padding-bottom: 20px;
                border: 3px solid transparent;
    }

            /* Resim Yolları (Buraya kendi resim linklerini koyabilirsin) */
            .btn-1 { background-image: url('büy-şap.png'); }
            .btn-2 { background-image: url('ik-şi.png'); }

            /* HOVER EFEKTİ */
            .custom-button:hover {
                transform: scale(1.05) translateY(-10px); /* Büyüme ve hafif yukarı kalkma */
                box-shadow: 0 20px 40px rgba(0,0,0,0.6); /* Gölge efekti */
                border-color: #3498db; /* Kenarlık parlaması */
}


        </style>
    </head>
    <body>
    <!-- Üst Yazı -->
        <header class="header-footer">
            <div style="display: flex; align-items: center; gap: 10px;">
                <a href="index.html">
                    <img src="favicon-removebg-preview.png" alt="Logo" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover; " >
                </a>
                <div class="logo">HSB Seyr Okyanusu</div>
            </div>
    
    <!-- Hamburger Simgesi -->
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        
            <!-- Menü Linkleri -->
            <nav class="nav-menu" id="nav-menu">
                <a href="index.html">Ana Sayfa</a>
                <a href="iks.html">İksirler</a>
                <a href="büy.html">Büyüler</a>
                
            </nav>
        </header>


    <div class="section gray">Harita</div>
    <div class="section dark">Kitaplar</div>


<!-- 3. Bölüm: Senin İstediğin Butonlar -->
    <div class="section button-container">
        <a href="büy.html" class="custom-button btn-1">
            <span>Büyüler</span>
        </a>
        <a href="iks.html" class="custom-button btn-2">
            <span>İksirler</span>
        </a>
    </div>

    
    
    <div class="section gray">Sihirli eşyalar</div>
    <div class="section dark">Binalar</div>

    <!-- Alt Yazı -->
    <footer class="header-footer">Alt Yazı / İletişim</footer>

        <script>
            const hamburger = document.getElementById('hamburger');
            const navMenu = document.getElementById('nav-menu');
        
            hamburger.addEventListener('click', () => {
            // Tıklandığında 'active' sınıfını ekle veya çıkar (toggle)
            hamburger.classList.toggle('active');
            navMenu.classList.toggle('active');
            });

        </script>

    </body>
</html>
